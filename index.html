<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#eef7f0">
<title>織夢助手｜花種升級計算器</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#e9f5ed,#f7f4e8);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;color:#4a4a42}
.wrap{max-width:640px;margin:auto;padding:16px 14px 46px}
h1{text-align:center;font-size:24px;color:#47795a;margin:6px 0 16px}
.card{background:#fffdf7;border:1px solid #cce2cf;border-radius:19px;padding:16px;margin:12px 0;box-shadow:0 10px 30px rgba(71,111,78,.12)}
h2{font-size:18px;color:#47795a;margin:0 0 12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.full{grid-column:1/-1}
label{display:block;font-size:13px;color:#7c8179;margin-bottom:6px}
input,select{width:100%;min-height:46px;border:1px solid #bdd6c0;background:#fff;border-radius:12px;padding:10px 12px;font-size:17px;color:#4a4a42}
.field-row{display:grid;grid-template-columns:1.1fr .75fr 42px;gap:8px;align-items:end;background:#f4faf4;border:1px solid #dcebdc;border-radius:14px;padding:12px;margin:9px 0}
.custom-box{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#edf5ec;border-radius:12px;padding:10px}
.remove{width:42px;height:46px;border:0;border-radius:11px;background:#f8e8e8;color:#c75a5a;font-size:21px}
.secondary{width:100%;padding:12px;border-radius:12px;border:1px dashed #82b98c;background:#f3fbf4;color:#4f8c5f;font-size:16px}
.primary{width:100%;padding:14px;border:0;border-radius:14px;background:linear-gradient(180deg,#7bc980,#4f9f67);color:#fff;font-size:18px;font-weight:700;box-shadow:0 7px 0 #3c8950}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#f0f8f1;border-radius:13px;padding:12px;text-align:center}
.stat b{display:block;margin-top:4px;color:#3f8656;font-size:22px}
.result-main{background:linear-gradient(135deg,#effaef,#fff6d9);border:1px solid #cfe4c4;border-radius:16px;padding:14px;margin-bottom:10px}
.big{font-size:31px;font-weight:800;color:#3f8656}
.muted{color:#7c8179;font-size:13px;line-height:1.6}
.warn{color:#c75a5a;font-weight:700}
.pill{display:inline-block;margin:8px 4px 0 0;padding:6px 9px;border-radius:999px;background:#e6f3e8;color:#4a895c;font-size:12px}
.empty{padding:18px;text-align:center;color:#7c8179;border:1px dashed #cbdccb;border-radius:13px}
.hide{display:none!important}
@media(max-width:430px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.field-row{grid-template-columns:1fr .72fr 42px}.custom-box{grid-template-columns:1fr}}

.nav-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 0 14px}
.nav-tab{border:1px solid #bdd6c0;background:#f7fbf7;color:#4f7f5c;border-radius:12px;padding:11px;font-size:15px;font-weight:700}
.nav-tab.active{background:#4f9f67;color:#fff;border-color:#4f9f67}
.page{display:none}.page.active{display:block}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:12px}
.toolbar button{border:0;border-radius:12px;padding:0 14px;background:#4f9f67;color:#fff;font-weight:700}
.flower-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.flower-card{background:#f7fbf7;border:1px solid #d8e8d9;border-radius:14px;padding:12px}
.flower-card h3{margin:0 0 7px;color:#47795a;font-size:16px}
.flower-card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:10px;margin-bottom:8px;background:#eef4ee}
.badge{display:inline-block;background:#e8f4e9;color:#4b865b;border-radius:999px;padding:4px 8px;font-size:12px;margin:2px 4px 2px 0}
.status-box{padding:12px;border-radius:12px;background:#f4f8f4;color:#6f756e;font-size:13px}
@media(max-width:430px){.flower-list{grid-template-columns:1fr}}

</style>
</head>
<body>
<div class="wrap">
<h1>🌸 織夢助手</h1>
<div class="nav-tabs">
<button class="nav-tab active" data-page="calculatorPage">升級計算</button>
<button class="nav-tab" data-page="flowersPage">花種圖鑑</button>
</div>
<section id="calculatorPage" class="page active">



<section class="card">
<h2>花種升級計算器</h2>
<div class="grid">
<div>
<label for="currentLevel">目前等級</label>
<select id="currentLevel">
<option value="1">Lv.1</option><option value="2">Lv.2</option><option value="3">Lv.3</option><option value="4">Lv.4</option><option value="5">Lv.5</option><option value="6">Lv.6</option><option value="7">Lv.7</option><option value="8">Lv.8</option><option value="9">Lv.9</option><option value="10">Lv.10</option><option value="11">Lv.11</option><option value="12" selected>Lv.12</option><option value="13">Lv.13</option><option value="14">Lv.14</option><option value="15">Lv.15</option><option value="16">Lv.16</option><option value="17">Lv.17</option>
</select>
</div>
<div>
<label for="targetLevel">目標等級</label>
<select id="targetLevel">
<option value="2">Lv.2</option><option value="3">Lv.3</option><option value="4">Lv.4</option><option value="5">Lv.5</option><option value="6">Lv.6</option><option value="7">Lv.7</option><option value="8">Lv.8</option><option value="9">Lv.9</option><option value="10">Lv.10</option><option value="11">Lv.11</option><option value="12">Lv.12</option><option value="13">Lv.13</option><option value="14">Lv.14</option><option value="15">Lv.15</option><option value="16">Lv.16</option><option value="17">Lv.17</option><option value="18" selected>Lv.18</option>
</select>
</div>
<div class="full">
<label for="currentNectar">目前該花種花蜜</label>
<input id="currentNectar" type="number" min="0" inputmode="numeric" value="16">
<div id="levelHint" class="muted"></div>
</div>
</div>
</section>

<section class="card">
<h2>商會田地配置</h2>
<div id="fieldRows"></div>
<div id="emptyState" class="empty hide">尚未新增田地</div>
<button id="addFieldButton" type="button" class="secondary">＋ 新增田地</button>
<p class="muted">已知田地資料：Lv.10～Lv.13。其他等級可選「自訂」。</p>
</section>

<section class="card">
<h2>採收估算</h2>
<label for="dailyRounds">平均每天採收幾輪</label>
<input id="dailyRounds" type="number" min="1" max="24" inputmode="numeric" value="4">
</section>

<button id="calculateButton" type="button" class="primary">開始計算</button>

<section id="resultCard" class="card hide">
<h2>計算結果</h2>
<div id="errorBox" class="warn hide"></div>
<div id="resultContent">
<div class="result-main"><div class="muted">預估完成時間</div><div id="daysResult" class="big">—</div><div id="dateResult"></div></div>
<div class="summary">
<div class="stat">尚缺花蜜<b id="needResult">—</b></div>
<div class="stat">需要採收<b id="roundResult">—</b></div>
<div class="stat">每輪花蜜<b id="perRoundResult">—</b></div>
<div class="stat">每日約得<b id="perDayResult">—</b></div>
</div>
<div><span id="fastestResult" class="pill">最快滿額：—</span><span id="latestResult" class="pill">最晚滿額：—</span></div>
<p class="muted">※ 這是依平均每日採收輪數估算；只計算商會田地固定取得的花蜜。</p>
</div>
</section>

</section>
<section id="flowersPage" class="page">
<section class="card">
<h2>花種圖鑑</h2>
<div class="toolbar">
<input id="flowerSearch" type="search" placeholder="搜尋花種名稱">
<button id="reloadFlowers" type="button">重新整理</button>
</div>
<div id="flowerStatus" class="status-box">尚未載入花種資料</div>
<div id="flowerList" class="flower-list" style="margin-top:12px"></div>
</section>
</section>
</div>

<script>
(function(){
"use strict";
var UPGRADE={1:1,2:2,3:4,4:8,5:15,6:30,7:60,8:100,9:250,10:500,11:800,12:1200,13:2200,14:3600,15:5000,16:7500,17:9000,18:null,19:null};
var FIELD={10:{capacity:24,secondsPerFlower:630},11:{capacity:26,secondsPerFlower:600},12:{capacity:28,secondsPerFlower:570},13:{capacity:30,secondsPerFlower:540}};
function el(id){return document.getElementById(id)}
function options(selected){
  var vals=[10,11,12,13,"custom"],html="";
  for(var i=0;i<vals.length;i++){
    var v=vals[i],label=v==="custom"?"自訂等級":"Lv."+v;
    html+='<option value="'+v+'"'+(String(v)===String(selected)?' selected':'')+'>'+label+'</option>';
  }
  return html;
}
function refreshEmpty(){el("emptyState").classList.toggle("hide",el("fieldRows").children.length>0)}
function addField(level,qty){
  var row=document.createElement("div");
  row.className="field-row";
  row.innerHTML=
  '<div><label>田地等級</label><select class="field-level">'+options(level||10)+'</select></div>'+
  '<div><label>數量</label><input class="field-qty" type="number" min="0" value="'+(qty==null?1:qty)+'"></div>'+
  '<button type="button" class="remove">×</button>'+
  '<div class="custom-box hide"><div><label>每塊容量（朵）</label><input class="custom-capacity" type="number" min="1" value="20"></div><div><label>每朵生成時間（分鐘）</label><input class="custom-minutes" type="number" min="0.1" step="0.1" value="12"></div></div>';
  var levelSel=row.querySelector(".field-level"),custom=row.querySelector(".custom-box");
  levelSel.addEventListener("change",function(){custom.classList.toggle("hide",levelSel.value!=="custom")});
  row.querySelector(".remove").addEventListener("click",function(){row.remove();refreshEmpty()});
  el("fieldRows").appendChild(row);
  refreshEmpty();
}
function hint(){
  var c=Number(el("currentLevel").value);
  el("levelHint").textContent=UPGRADE[c]?"目前等級升下一級共需要 "+UPGRADE[c]+" 花蜜":"此等級升下一級的花蜜需求尚未提供";
}
function duration(s){
  var h=Math.floor(s/3600),m=Math.round((s%3600)/60);
  return h+"小時"+(m?m+"分":"");
}
function error(msg){
  el("resultCard").classList.remove("hide");
  el("errorBox").textContent=msg;
  el("errorBox").classList.remove("hide");
  el("resultContent").classList.add("hide");
}
function calculate(){
  try{
    var current=Number(el("currentLevel").value),target=Number(el("targetLevel").value),progress=Math.max(0,Number(el("currentNectar").value)||0);
    if(target<=current)throw Error("目標等級必須高於目前等級。");
    var needed=0;
    for(var lv=current;lv<target;lv++){
      if(UPGRADE[lv]==null)throw Error("缺少 Lv."+lv+" → Lv."+(lv+1)+" 的花蜜需求資料。");
      needed+=lv===current?Math.max(0,UPGRADE[lv]-progress):UPGRADE[lv];
    }
    var rows=el("fieldRows").querySelectorAll(".field-row");
    if(!rows.length)throw Error("請先新增至少一組田地。");
    var flowers=0,total=0,fast=Infinity,late=0;
    for(var i=0;i<rows.length;i++){
      var row=rows[i],level=row.querySelector(".field-level").value,qty=Math.max(0,Number(row.querySelector(".field-qty").value)||0);
      if(!qty)continue;
      var cap,spf;
      if(level==="custom"){
        cap=Math.max(1,Number(row.querySelector(".custom-capacity").value)||0);
        spf=Math.max(1,(Number(row.querySelector(".custom-minutes").value)||0)*60);
      }else{
        cap=FIELD[level].capacity;spf=FIELD[level].secondsPerFlower;
      }
      var full=cap*spf;
      flowers+=cap*qty;total+=qty;fast=Math.min(fast,full);late=Math.max(late,full);
    }
    if(!total)throw Error("田地數量不能全部為 0。");
    var perRound=flowers*2,rounds=Math.ceil(needed/perRound),daily=Math.max(1,Number(el("dailyRounds").value)||1),days=rounds/daily;
    var finish=new Date(Date.now()+days*86400000);
    el("needResult").textContent=needed.toLocaleString();
    el("roundResult").textContent=rounds.toLocaleString()+" 輪";
    el("perRoundResult").textContent=perRound.toLocaleString();
    el("perDayResult").textContent=(perRound*daily).toLocaleString();
    el("daysResult").textContent=days<1?"約 "+Math.ceil(days*24)+" 小時":"約 "+days.toFixed(1)+" 天";
    el("dateResult").textContent="約於 "+finish.toLocaleDateString("zh-TW")+" 完成";
    el("fastestResult").textContent="最快滿額："+duration(fast);
    el("latestResult").textContent="最晚滿額："+duration(late);
    el("resultCard").classList.remove("hide");
    el("errorBox").classList.add("hide");
    el("resultContent").classList.remove("hide");
  }catch(e){error(e.message||String(e))}
}
el("addFieldButton").addEventListener("click",function(){addField(10,1)});
el("calculateButton").addEventListener("click",calculate);
el("currentLevel").addEventListener("change",hint);
addField(10,11);
addField(13,1);
hint();

var SUPABASE_URL="https://ppfzprahcitsbjtmuhrg.supabase.co";
var SUPABASE_KEY="sb_publishable_xaba5s4ZaeJ1yuhxX1qW4w_jzphTait";
var flowerRows=[];

function pick(obj,keys,fallback){
  for(var i=0;i<keys.length;i++){
    var v=obj[keys[i]];
    if(v!==undefined&&v!==null&&String(v).trim()!=="")return String(v);
  }
  return fallback||"";
}
function renderFlowers(){
  var keyword=(el("flowerSearch").value||"").trim().toLowerCase();
  var list=flowerRows.filter(function(item){
    var name=pick(item,["name","flower_name","title","名稱","花名"],"未命名");
    return !keyword||name.toLowerCase().indexOf(keyword)!==-1;
  });
  el("flowerList").innerHTML="";
  if(!list.length){
    el("flowerStatus").textContent=flowerRows.length?"找不到符合的花種":"資料表目前沒有花種資料";
    return;
  }
  el("flowerStatus").textContent="共 "+list.length+" 筆花種";
  list.forEach(function(item){
    var name=pick(item,["name","flower_name","title","名稱","花名"],"未命名");
    var score=pick(item,["score","points","prosperity","繁榮度","分數"],"");
    var source=pick(item,["source","acquisition","obtain_method","取得方式","獲取方式"],"");
    var image=pick(item,["image_url","image","photo_url","圖片"],"");
    var available=pick(item,["available","is_available","obtainable","是否可獲"],"");
    var card=document.createElement("article");
    card.className="flower-card";
    var imageHtml=image?'<img src="'+image.replace(/"/g,"&quot;")+'" alt="'+name.replace(/"/g,"&quot;")+'">':"";
    var badges="";
    if(score)badges+='<span class="badge">分數 '+score+'</span>';
    if(available!=="")badges+='<span class="badge">'+((available==="true"||available==="1")?"可獲得":"暫不可獲")+'</span>';
    card.innerHTML=imageHtml+"<h3>"+name+"</h3>"+badges+(source?'<p class="muted">取得方式：'+source+"</p>":"");
    el("flowerList").appendChild(card);
  });
}
async function loadFlowers(){
  el("flowerStatus").textContent="正在讀取 Supabase 花種資料…";
  el("flowerList").innerHTML="";
  try{
    var response=await fetch(SUPABASE_URL+"/rest/v1/flowers?select=*",{headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":"Bearer "+SUPABASE_KEY
    }});
    if(!response.ok)throw new Error("讀取失敗（"+response.status+"）");
    flowerRows=await response.json();
    renderFlowers();
  }catch(err){
    el("flowerStatus").textContent=err.message||String(err);
  }
}
document.querySelectorAll(".nav-tab").forEach(function(button){
  button.addEventListener("click",function(){
    document.querySelectorAll(".nav-tab").forEach(function(x){x.classList.remove("active")});
    document.querySelectorAll(".page").forEach(function(x){x.classList.remove("active")});
    button.classList.add("active");
    el(button.getAttribute("data-page")).classList.add("active");
    if(button.getAttribute("data-page")==="flowersPage"&&!flowerRows.length)loadFlowers();
  });
});
el("flowerSearch").addEventListener("input",renderFlowers);
el("reloadFlowers").addEventListener("click",loadFlowers);

})();
</script>
</body>
</html>
